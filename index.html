<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2D Spaceflight Prototype</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; background: #000; }
    #err {
      position: fixed; left: 10px; top: 10px;
      padding: 10px; max-width: 90vw;
      background: rgba(140,0,0,0.85); color: #fff;
      font: 14px system-ui, sans-serif; white-space: pre-wrap;
      display: none; border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="err"></div>
  <canvas id="canvas"></canvas>

  <script>
    // Show JS errors on the page (Chromebook-friendly)
    const box = document.getElementById("err");
    window.addEventListener("error", (e) => {
      box.style.display = "block";
      box.textContent = "JS error:\\n" + (e.message || e.error || "unknown") +
        (e.filename ? `\\n${e.filename}:${e.lineno}:${e.colno}` : "");
    });
  </script>

  <script defer src="./main.js"></script>
</body>
</html>
