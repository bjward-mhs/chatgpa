<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2D Spaceflight Prototype</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; background: #000; }
    #err, #dbg {
      position: fixed; left: 10px; top: 10px;
      padding: 10px; max-width: 92vw;
      font: 14px system-ui, sans-serif; white-space: pre-wrap;
      border-radius: 8px;
    }
    #err { background: rgba(140,0,0,0.85); color: #fff; display:none; top: 10px; }
    #dbg { background: rgba(0,0,0,0.55); color: #fff; top: 10px; }
  </style>
</head>
<body>
  <div id="err"></div>
  <div id="dbg">loading…</div>
  <canvas id="canvas" tabindex="0"></canvas>

  <script>
    const err = document.getElementById("err");
    const dbg = document.getElementById("dbg");
    window.addEventListener("error", (e) => {
      err.style.display = "block";
      err.textContent = "JS error:\n" + (e.message || e.error || "unknown") +
        (e.filename ? `\n${e.filename}:${e.lineno}:${e.colno}` : "");
    });

    // show that key events are being received
    let lastKey = "(none)";
    window.addEventListener("keydown", (e) => {
      lastKey = e.code;
      dbg.textContent = "keydown seen: " + lastKey;
    });
  </script>

  <!-- IMPORTANT: cache-bust while debugging -->
  <script defer src="./main.js?v=2"></script>
</body>
</html>
